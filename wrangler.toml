name = "znations-web"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

assets = { directory = ".open-next/assets", binding = "ASSETS" }

[[d1_databases]]
binding = "ZNATIONS_DB"
database_name = "znations-web"
database_id = "replace-with-cloudflare-d1-id"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "ZNATIONS_CACHE"
id = "replace-with-cloudflare-kv-id"

[vars]
NEXT_PUBLIC_SITE_URL = "https://shop.znationssmp.com"
NEXT_PUBLIC_SERVER_NAME = "ZNations SMP"
NEXT_PUBLIC_SERVER_ADDRESS = "play.znationssmp.com"
NEXT_PUBLIC_BEDROCK_ADDRESS = "bedrock.znationssmp.com"
NEXT_PUBLIC_BEDROCK_PORT = "19132"
NEXT_PUBLIC_DISCORD_URL = ""
NEXT_PUBLIC_BLUEMAP_URL = ""
NEXT_PUBLIC_ENABLE_DEMO_DATA = "false"
ZN_ADMIN_USERNAME = "owner"
ZN_PLAYER_USERNAME = "zayden"
ZN_INGEST_SECRET = ""
